name: jpsports-frontend
region: ams
services:
  - name: web
    image:
      registry_type: DOCR
      repository: frontend
      tag: latest
      deploy_on_push:
        enabled: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /
