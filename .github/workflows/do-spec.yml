name: do-spec

on:
  pull_request:
    paths: ['.do/**']

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Validate app specs
        run: |
          shopt -s nullglob
          specs=(.do/*.yaml .do/*.yml)
          if [ ${#specs[@]} -eq 0 ]; then
            echo "No specs found under .do/"; exit 0
          fi
          for f in "${specs[@]}"; do
            echo "Validating $f"
            doctl apps spec validate "$f" >/dev/null
          done
