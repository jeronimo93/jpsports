name: frontend

on:
  # NOTE: `paths` applies to tag events too. The release flow must bump
  # the version in frontend/package.json so the tagged commit touches
  # frontend/** — otherwise the tag push is silently filtered out.
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
    tags: ['frontend-v[0-9]*']
  workflow_dispatch:

env:
  IMAGE: registry.digitalocean.com/princeyscr/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Compute tags
        id: tags
        run: |
          {
            echo 'tags<<EOF'
            if [[ "$GITHUB_REF" == refs/tags/frontend-v* ]]; then
              V="${GITHUB_REF#refs/tags/frontend-v}"
              echo "$IMAGE:$V"
              echo "$IMAGE:latest"
            else
              echo "$IMAGE:latest"
              echo "$IMAGE:sha-${GITHUB_SHA::7}"
            fi
            echo 'EOF'
          } >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
