name: frontend

on:
  # NOTE: `paths` applies to tag events too. The release flow must bump
  # the version in frontend/package.json so the tagged commit touches
  # frontend/** — otherwise the tag push is silently filtered out.
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
    tags: ['frontend-v[0-9]*']
  workflow_dispatch:

env:
  IMAGE: registry.digitalocean.com/princeyscr/frontend

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: yarn --cwd frontend install --frozen-lockfile

      - name: Type check
        run: yarn --cwd frontend tsc --noEmit

  build-and-push:
    needs: typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Compute tags
        id: tags
        run: |
          {
            echo 'tags<<EOF'
            if [[ "$GITHUB_REF" == refs/tags/frontend-v* ]]; then
              V="${GITHUB_REF#refs/tags/frontend-v}"
              echo "$IMAGE:$V"
              echo "$IMAGE:latest"
            else
              echo "$IMAGE:latest"
              echo "$IMAGE:sha-${GITHUB_SHA::7}"
            fi
            echo 'EOF'
          } >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
