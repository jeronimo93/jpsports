name: backend

on:
  # NOTE: `paths` applies to tag events too. The release flow must bump
  # <Version> in backend/JPSports.Api.csproj so the tagged commit touches
  # backend/** — otherwise the tag push is silently filtered out.
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend.tests/**'
      - '.github/workflows/backend.yml'
    tags: ['backend-v[0-9]*']
  workflow_dispatch:

env:
  IMAGE: registry.digitalocean.com/princeyscr/backend

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test backend.tests/JPSports.Api.Tests.csproj --configuration Release

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Compute tags
        id: tags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/backend-v* ]]; then
            V="${GITHUB_REF#refs/tags/backend-v}"
            echo "tags=$IMAGE:$V,$IMAGE:latest" >>"$GITHUB_OUTPUT"
          else
            echo "tags=$IMAGE:latest,$IMAGE:sha-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - name: Build and push
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          IFS=',' read -ra T <<< "$TAGS"
          ARGS=()
          for t in "${T[@]}"; do ARGS+=(-t "$t"); done
          docker build "${ARGS[@]}" -f backend/Dockerfile backend
          for t in "${T[@]}"; do docker push "$t"; done
