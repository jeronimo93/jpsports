server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # We sit behind an App Platform LB, so never rewrite redirects to
    # include this container's host:port — always return relative paths.
    absolute_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Hashed static assets — cache aggressively
    location /_expo/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Liveness probe — cheap, no logging, bypasses the SPA shell
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy to the internal `api` service in the same App Platform app.
    # Trailing slashes strip the /api prefix so the backend sees bare paths
    # (e.g. browser GET /api/health -> backend sees GET /health).
    # `location /api/` only matches paths with a trailing slash, so redirect
    # the bare form. 308 preserves method and body (unlike 301/302).
    location = /api { return 308 /api/; }
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — never cache index.html
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
